### Domain-specific entity extraction profile for PEM GraphRAG.
### Copy this file to PROMPT_DIR/entity_type/pem_graphrag_entity_type_prompt.yml
### and set ENTITY_TYPE_PROMPT_FILE=pem_graphrag_entity_type_prompt.yml.
### Both example sections are included so the profile works with
### ENTITY_EXTRACTION_USE_JSON=false and ENTITY_EXTRACTION_USE_JSON=true.

entity_types_guidance: |
  Classify each entity using one of the following broad, stable types. If no type fits, use `Other`.

  - ResearchField: Scientific or engineering domains and subdomains, such as electrical engineering, energy systems, chemistry, electrochemistry, industrial engineering, construction engineering, digital manufacturing, and production engineering.
  - Concept: Theories, phenomena, technologies, modeling ideas, mechanisms, safety phenomena, system ideas, and degradation mechanisms, such as lithium-ion battery technology, solid-state battery technology, thermal runaway, ion transport mechanisms, crossover phenomena, and digital twins.
  - Method: Testing, characterization, analysis, optimization, modeling, simulation, control, life cycle assessment, and data-driven methods, such as electrochemical testing, half-cell testing, predictive control, machine learning-based parameter optimization, and manufacturing cost modeling.
  - Process: Manufacturing, assembly, drying, recycling, integration, scaling, planning, production, and process-chain workflows, such as battery cell manufacturing, electrode drying, cell assembly, battery pack integration, lithium-ion battery recycling, and factory planning.
  - Artifact: Engineered systems, devices, components, cells, packs, motors, equipment, and industrial lines, such as lithium-ion battery cells, battery electrodes, PEM electrolyzers, fuel cell systems, battery energy storage systems, power electronics systems, production equipment, and automated assembly systems.
  - Material: Chemical compounds, electrode materials, electrolytes, membranes, catalysts, and other physical materials, such as lithium compounds, graphite, metal oxides, solid electrolytes, fuel cell membranes, catalytic materials, and Al/C electrode materials.
  - Organization: Universities, institutes, associations, companies, project partners, and industrial actors, such as PEM RWTH Aachen, RWTH Aachen University, VDMA, Fraunhofer FFB, and industrial OEM partners.
  - Content: Publications and document types, such as journal articles, conference proceedings, PhD theses, technical reports, whitepapers, guidelines, books, handbooks, and poster presentations.
  - Data: Quantitative or structured information, measurements, KPIs, test results, datasets, lifecycle metrics, model parameters, cost data, and production metrics.
  - Other: Fallback for important entities that do not fit the defined types.

  Extraction rules:
  - Prefer domain-specific canonical names over vague names. For example, use `Proton Exchange Membrane Electrolysis` instead of `electrolysis` when the context supports it.
  - Extract cross-domain relationships between research fields, concepts, methods, processes, artifacts, materials, organizations, data, and publication outputs.
  - Keep publication types as `Content` nodes when explicitly mentioned.
  - Avoid over-specific one-off phrases unless they are central technical terms in the input.
  - Treat `PEM RWTH Aachen` and `RWTH Aachen University` as distinct but related `Organization` nodes when both are present.

