services:
  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - ghcr.io/hkuds/lightrag:latest
    ports:
      - "${HOST:-0.0.0.0}:${PORT:-9621}:9621"
    volumes:
      - ./data/rag_storage:/app/data/rag_storage
      - ./data/inputs:/app/data/inputs
      - ./data/prompts:/app/data/prompts
      - ./.env:/app/.env
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      PROMPT_DIR: "/app/data/prompts"
      LLM_BINDING: "${LLM_BINDING:-ollama}"
      LLM_BINDING_HOST: "${LLM_BINDING_HOST:-http://host.docker.internal:11434}"
      LLM_MODEL: "${LLM_MODEL:-qwen2.5:7b}"
      LLM_TIMEOUT: "${LLM_TIMEOUT:-300}"
      EMBEDDING_BINDING: "${EMBEDDING_BINDING:-ollama}"
      EMBEDDING_BINDING_HOST: "${EMBEDDING_BINDING_HOST:-http://host.docker.internal:11434}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-768}"
      EMBEDDING_TOKEN_LIMIT: "${EMBEDDING_TOKEN_LIMIT:-8192}"
      EMBEDDING_TIMEOUT: "${EMBEDDING_TIMEOUT:-300}"
      LIGHTRAG_GRAPH_STORAGE: "Neo4JStorage"
      NEO4J_URI: "neo4j://neo4j:7687"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-neo4j_password}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      HOST: "0.0.0.0"
      PORT: "9621"
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'PORT_HEX="$(printf ''%04X'' 7687)"; cat /proc/net/tcp /proc/net/tcp6 2>/dev/null | grep -q ":$${PORT_HEX} "'
      interval: 10s
      timeout: 3s
      retries: 120
      start_period: 10s
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}"
      NEO4J_dbms_default__database: "${NEO4J_DATABASE:-neo4j}"

volumes:
  neo4j_data:
